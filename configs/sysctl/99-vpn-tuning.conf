# sysctl настройки для VPN-сервера от xray-vpn-stack
# Применить: sysctl --system

# === BBR + fq qdisc (лучший congestion control) ===
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# === TCP keepalive (закрывать мёртвые соединения быстрее) ===
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 3

# === Уменьшаем время висения orphan-сокетов ===
net.ipv4.tcp_orphan_retries = 2
net.ipv4.tcp_fin_timeout = 15

# === TCP Fast Open ===
net.ipv4.tcp_fastopen = 3

# === Большие TCP буферы для high-throughput ===
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
net.ipv4.tcp_mem = 786432 1048576 1572864

# === Увеличиваем backlog для high-connection-rate ===
net.core.somaxconn = 4096
net.core.netdev_max_backlog = 4096
net.ipv4.tcp_max_syn_backlog = 4096

# === Защита от SYN flood ===
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_synack_retries = 3
net.ipv4.tcp_max_tw_buckets = 65536

# === Отключение IPv6 forwarding (не нужен, лишняя поверхность атаки) ===
net.ipv6.conf.all.forwarding = 0
net.ipv6.conf.default.forwarding = 0

# === IP forwarding включаем (нужно для VLESS-туннелей) ===
net.ipv4.ip_forward = 1
