{% extends "base.html" %}
{% block title %}{% if mode == 'edit' %}Edit{% else %}New{% endif %} user — xray-admin{% endblock %}

{% block content %}
<h1>
    {% if mode == 'edit' %}Edit user «{{ user.email }}»{% else %}Создать юзера{% endif %}
</h1>

<form method="POST" class="form-stack" id="user-form">
    <label>
        Email <span class="required">*</span>
        <input type="text" name="email" required maxlength="64"
               pattern="[a-zA-Z0-9_\-\.]+(@[a-zA-Z0-9_\-\.]+)?"
               value="{{ user.email if user else '' }}"
               placeholder="например: vera или vera@server">
        <small>если без @ — автоматически добавится @server</small>
    </label>

    <label>
        UUID <span class="required">*</span>
        <div class="input-with-button">
            <input type="text" name="uuid" id="uuid-input" required
                   pattern="[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
                   value="{{ user.id if user else '' }}"
                   placeholder="нажми «Сгенерировать»">
            <button type="button" id="gen-uuid" class="btn-secondary">🎲 Сгенерировать</button>
        </div>
        {% if mode == 'edit' %}
        <small class="warning">⚠ изменение UUID отключит существующих клиентов — потребуется обновление подписок</small>
        {% else %}
        <small>уникальный идентификатор юзера</small>
        {% endif %}
    </label>

    <label>
        Inbounds <span class="required">*</span>
        <div class="chip-selector" id="chip-selector">
            {% if available_inbounds %}
                {% for tag in available_inbounds %}
                <label class="chip {% if tag in selected_inbounds %}chip-selected{% endif %}">
                    <input type="checkbox" name="inbounds" value="{{ tag }}"
                           {% if tag in selected_inbounds %}checked{% endif %}>
                    <span class="chip-check">✓</span>
                    <span class="chip-label">{{ tag }}</span>
                </label>
                {% endfor %}
            {% else %}
                <p class="muted">нет доступных inbound'ов. Сначала <a href="{{ url_for('inbounds_new') }}">создай inbound</a>.</p>
            {% endif %}
        </div>
        <small>юзер должен быть выбран хотя бы в одном inbound'е</small>
    </label>

    <div class="form-actions">
        <button type="submit" class="btn-primary" {% if not available_inbounds %}disabled{% endif %}>
            {% if mode == 'edit' %}Сохранить{% else %}Создать{% endif %}
        </button>
        <a href="{{ url_for('users_list') }}" class="btn-cancel">Отмена</a>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
(function() {
    // Кнопка генерации UUID
    var genBtn = document.getElementById('gen-uuid');
    var uuidInput = document.getElementById('uuid-input');
    if (genBtn) {
        genBtn.addEventListener('click', function() {
            var mode = '{{ mode }}';
            // Если есть существующий UUID и режим edit — спрашиваем подтверждение
            if (mode === 'edit' && uuidInput.value && uuidInput.value.length > 0) {
                if (!confirm('Регенерация UUID отключит существующих клиентов. Продолжить?')) {
                    return;
                }
            }
            fetch('/api/generate-uuid')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    uuidInput.value = data.uuid;
                });
        });
    }

    // Chip selector — toggle класса на label
    var chipSelector = document.getElementById('chip-selector');
    if (chipSelector) {
        chipSelector.addEventListener('change', function(e) {
            var checkbox = e.target;
            if (checkbox.type === 'checkbox') {
                var label = checkbox.closest('.chip');
                if (checkbox.checked) {
                    label.classList.add('chip-selected');
                } else {
                    label.classList.remove('chip-selected');
                }
            }
        });
    }

    // Перед отправкой — клиентская валидация: минимум 1 inbound
    var form = document.getElementById('user-form');
    if (form) {
        form.addEventListener('submit', function(e) {
            var checked = form.querySelectorAll('input[name="inbounds"]:checked');
            if (checked.length === 0) {
                e.preventDefault();
                alert('Выбери хотя бы один inbound');
                return false;
            }
        });
    }
})();
</script>
{% endblock %}
